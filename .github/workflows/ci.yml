name: CI - Lint, Type Check, Test

# Trigger on push to main/develop and all pull requests
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Environment variables available to all jobs
env:
  NODE_VERSION: "20.x"
  NODE_ENV: "test"

jobs:
  # Job 1: Lint code with ESLint
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

  # Job 2: Type check with TypeScript
  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npx tsc --noEmit
        continue-on-error: false

  # Job 3: Build verification
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        continue-on-error: false

      - name: Upload build artifacts (for deploy workflows)
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 7

  # Job 4: Test execution (when tests are implemented)
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage --passWithNoTests
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Job 5: Security checks (future: dependency scanning)
  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # Final status check: all jobs must pass
  ci-success:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, type-check, build, test, security]
    if: always()

    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.type-check.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ CI Failed: Lint, Type Check, or Build failed"
            exit 1
          fi
          echo "✅ CI Passed"

# Documentation:
#
# Workflow Triggers:
#   - Runs on every push to main/develop
#   - Runs on every pull request to main/develop
#   - Can be manually triggered via GitHub Actions tab
#
# Jobs:
#   1. Lint: ESLint code style enforcement
#   2. Type Check: TypeScript strict type checking
#   3. Build: Production build verification
#   4. Test: Unit/integration test execution (placeholder for now)
#   5. Security: npm audit for vulnerabilities
#
# Status Checks:
#   - All jobs must pass for PR to be mergeable (enforce in branch settings)
#   - Uses continue-on-error: false to fail fast on errors
#   - Test job allows missing tests (--passWithNoTests)
#
# Artifacts:
#   - Build output stored for 7 days (used by deploy workflows)
#
# To enable:
#   1. Ensure npm scripts exist: lint, build, test
#   2. Go to Repo Settings → Branches → require status checks before merging
#   3. Select: lint, type-check, build, security
